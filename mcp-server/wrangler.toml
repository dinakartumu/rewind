name = "rewind-mcp"
main = "src/worker.ts"
compatibility_date = "2026-03-12"
compatibility_flags = ["nodejs_compat"]
workers_dev = true
# Pinned so CI's scoped API token deploys without a /memberships account
# lookup (that endpoint 401s for account-scoped tokens). Not a secret.
account_id = "e7feb32a6387962b71058b1d51853258"

# Custom domain
routes = [
  { pattern = "mcp.dinakartumu.com", custom_domain = true }
]

# KV namespace for OAuth token storage (encrypted by workers-oauth-provider)
[[kv_namespaces]]
binding = "OAUTH_KV"
id = "06720c4280dc4c5b809e9f3533e352ee"

# MCP Apps UI HTML bundles are inlined into the Worker source at build time
# via scripts/inline-bundles.mjs (reads web/dist/*.html -> src/ui-bundles.ts).
# No Workers Static Assets binding is needed at runtime.

[vars]
REWIND_API_URL = "https://rewind.dinakartumu.com"
# USER_ALLOWLIST is a JSON map of GitHub user ID -> Rewind user_id
# e.g. {"12345": 1}
# Set via: npx wrangler secret put USER_ALLOWLIST
# Or as a var here for non-sensitive allowlists:
# USER_ALLOWLIST = '{"YOUR_GITHUB_USER_ID": 1}'

# Secrets (set via `npx wrangler secret put <NAME>`):
# - REWIND_API_KEY: Static API key for server-to-server calls to api.rewind.rest
# - GITHUB_CLIENT_ID: GitHub OAuth App client ID
# - GITHUB_CLIENT_SECRET: GitHub OAuth App client secret
