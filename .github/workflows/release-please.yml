name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          # Use the built-in token (the workflow grants contents +
          # pull-requests write). A dedicated RELEASE_PLEASE_TOKEN PAT is only
          # needed to let the release PR/tag cascade into other workflows;
          # this fork doesn't rely on that.
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
