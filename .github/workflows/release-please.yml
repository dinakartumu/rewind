name: Release Please

# Opening a release PR requires the repo setting "Allow GitHub Actions to
# create and approve pull requests" (Settings -> Actions -> General), which
# is enabled for this repo. workflow_dispatch is kept for manual runs.
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          # Use the built-in token (the workflow grants contents +
          # pull-requests write). A dedicated RELEASE_PLEASE_TOKEN PAT is only
          # needed to let the release PR/tag cascade into other workflows;
          # this fork doesn't rely on that.
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
