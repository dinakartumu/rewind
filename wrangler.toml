name = "rewind"
main = "src/index.ts"
compatibility_date = "2026-03-12"
compatibility_flags = ["nodejs_compat"]
workers_dev = true
# Pinned so CI's scoped API token deploys without a /memberships account
# lookup (that endpoint 401s for account-scoped tokens). Not a secret.
account_id = "e7feb32a6387962b71058b1d51853258"

# Custom domain (zone dinakartumu.com on this Cloudflare account).
# The *.workers.dev URL stays active as well (workers_dev = true).
routes = [
  { pattern = "rewind.dinakartumu.com", custom_domain = true }
]

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "rewind-db"
database_id = "cd52eb43-e7e7-4781-b185-171f2afa163c"
migrations_dir = "migrations"

# R2 Bucket
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "rewind-images"

# Vectorize index for semantic search / related-articles (reading domain).
# Dimensions match voyage-3-lite (512, cosine metric). Embeddings are
# produced by the Voyage API — not Workers AI — because the quality
# premium on paraphrased recall is worth the external dependency at
# our scale.
[[vectorize]]
binding = "VECTORIZE_READING"
index_name = "rewind-reading"

# Shared KV namespace for fetch-on-render caches. Used by services that pull
# live external data (e.g. MLB Stats API season stats, 1h TTL). Key prefixes
# distinguish purposes: `mlb_stats:player:{id}:{season}`, `mlb_stats:teams:{season}`.
[[kv_namespaces]]
binding = "REWIND_CACHE"
id = "0c656a4610914eccb67a8b93cf186aa3"
preview_id = "0c656a4610914eccb67a8b93cf186aa3"

# Cron Triggers
[triggers]
crons = [
  "*/15 * * * *",   # Every 15 min: Last.fm scrobble sync
  "0 * * * *",      # Hourly: Strava activities + Trakt watch history + Foursquare check-ins
  "0 3 * * *",      # Daily 3:00 AM: Last.fm top lists + stats
  "30 3 * * *",     # Daily 3:30 AM: Plex library scan
  "45 3 * * SUN",   # Sunday 3:45 AM: Discogs + Trakt collections
  "0 */6 * * *",    # Every 6 hours: Letterboxd RSS + Instapaper
  "0 4 * * *",      # Daily 4:00 AM: Attending (Calendar + Gmail incremental)
  "0 5 * * SUN",    # Sunday 5:00 AM: Instapaper full deletion reconciliation
]

# Cloudflare Images (for thumbhash/color extraction)
[images]
binding = "IMAGE_TRANSFORMS"

# Persist request + console logs in the Cloudflare dashboard
# (Workers Observability -> Logs). head_sampling_rate = 1 keeps 100% of
# invocations; cron runs are low-volume so full retention is cheap.
[observability]
enabled = true
head_sampling_rate = 1

[vars]
ALLOWED_ORIGINS = "localhost:3000"
PLEX_OWNER_ACCOUNT_TITLE = "dinakartumu"
LASTFM_USERNAME = "dinakartumu"
GITHUB_USERNAME = "dinakartumu"
# Instapaper sync disabled — access token returns 401. Set to "true" or
# remove (and refresh INSTAPAPER_ACCESS_TOKEN/_SECRET) to re-enable.
ENABLE_INSTAPAPER = "false"
